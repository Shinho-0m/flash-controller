<!DOCTYPE html>
<html>
<head><title>Diagnose</title></head>
<body>
<h2>localStorage 诊断</h2>
<pre id="output"></pre>
<script>
const out = document.getElementById('output');
try {
  const raw = localStorage.getItem('fc_user');
  out.textContent += 'fc_user 原始数据:\n' + raw + '\n\n';
  if (raw) {
    const user = JSON.parse(raw);
    out.textContent += '解析后:\n' + JSON.stringify(user, null, 2) + '\n\n';
    out.textContent += 'username: ' + user.username + '\n';
    out.textContent += 'nickname: ' + user.nickname + '\n';
    out.textContent += 'level: ' + user.level + '\n';
    out.textContent += 'coins: ' + user.coins + '\n';
  }
  
  // Check all fc_ keys
  out.textContent += '\n=== 所有 fc_ 键 ===\n';
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('fc_')) {
      out.textContent += key + ' (length: ' + localStorage.getItem(key).length + ')\n';
    }
  }
} catch(e) {
  out.textContent += 'ERROR: ' + e.message;
}
</script>
</body>
</html>
